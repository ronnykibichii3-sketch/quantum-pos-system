version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: quantum_pos_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_system
    ports:
      - "5432:5432"
    volumes:
      - pos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_system"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    container_name: quantum_pos_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/payment_system?schema=public"
      AUTH_SECRET: "change-this-secret"
      PORT: "3000"
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && npm start"

volumes:
  pos_pgdata:
